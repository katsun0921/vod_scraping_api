name: News Bot - 公式X取得

on:
  # 地域ごとに1日1回、コスト管理のため分ける。
  schedule:
    - cron: "0 1 * * *"   # 日本メディア 1日1回
    - cron: "0 13 * * *"  # アメリカメディア 1日1回
  workflow_dispatch:
    inputs:
      region:
        description: "取得する地域（「公式X一覧」シートの地域列と一致させる）"
        required: false
        default: "日本"
        type: choice
        options:
          - "日本"
          - "アメリカ"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: news_bot/requirements.txt

      - name: Install dependencies
        run: pip install -r news_bot/requirements.txt

      - name: Run news bot X fetch pipeline
        env:
          # 1回の実行で処理する件数の上限。取得エントリ数がこれを超える分は
          # 切り捨てられる（翌日に持ち越されない）。情報が足りなければ増やす。
          NEWS_BOT_FETCH_LIMIT: "5"
          # workflow_dispatchはinputsの地域を使う。scheduleはgithub.event.inputsが
          # 存在しないため、どちらのcronが発火したか(github.event.schedule)で判定する。
          REGION: ${{ github.event.inputs.region || (github.event.schedule == '0 1 * * *' && '日本') || (github.event.schedule == '0 13 * * *' && 'アメリカ') || '日本' }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.NEWS_BOT_SLACK_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL_ID: ${{ secrets.NEWS_BOT_SLACK_APPROVAL_CHANNEL_ID }}
        run: python -m news_bot.main x "$REGION"
