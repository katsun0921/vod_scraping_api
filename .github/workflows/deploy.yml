name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and Push image
        run: |
          docker build \
            --tag ${{ secrets.ARTIFACT_REGISTRY_IMAGE }}:${{ github.sha }} \
            --tag ${{ secrets.ARTIFACT_REGISTRY_IMAGE }}:latest \
            .
          docker push ${{ secrets.ARTIFACT_REGISTRY_IMAGE }}:${{ github.sha }}
          docker push ${{ secrets.ARTIFACT_REGISTRY_IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vod-scraping-api \
            --image ${{ secrets.ARTIFACT_REGISTRY_IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region asia-northeast1 \
            --execution-environment gen2 \
            --no-allow-unauthenticated \
            --memory 512Mi \
            --timeout 3600 \
            --max-instances 1 \
            --concurrency 1 \
            --set-env-vars "\
              WP_API_URL=${{ secrets.WP_API_URL }},\
              WP_USER=${{ secrets.WP_USER }},\
              WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }},\
              WP_BASIC_USER=${{ secrets.WP_BASIC_USER }},\
              WP_BASIC_PASSWORD=${{ secrets.WP_BASIC_PASSWORD }},\
              SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" \
            --quiet
