name: Weekly VOD Patch

on:
  schedule:
    # 毎週月曜 02:00 JST（日曜 17:00 UTC）に実行
    - cron: "0 17 * * 0"
  workflow_dispatch:
    inputs:
      batch:
        description: "バッチ番号 0-7（空欄で実行日から自動判定）"
        required: false
        default: ""
      force:
        description: "7日以内の更新済みもスキップしない"
        type: boolean
        required: false
        default: false
      dry_run:
        description: "dry-run（対象確認のみ、更新なし）"
        type: boolean
        required: false
        default: false
      slug:
        description: "特定 slug のみ処理（空欄で全件）"
        required: false
        default: ""
      limit:
        description: "最大処理件数（空欄でバッジ内全件）"
        required: false
        default: ""

jobs:
  weekly-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run weekly patch
        env:
          WP_API_URL: ${{ secrets.WP_API_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_BASIC_USER: ${{ secrets.WP_BASIC_USER }}
          WP_BASIC_PASSWORD: ${{ secrets.WP_BASIC_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.batch }}" ]; then
            ARGS="$ARGS --batch ${{ inputs.batch }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.slug }}" ]; then
            ARGS="$ARGS --slug ${{ inputs.slug }}"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          python weekly_patch.py $ARGS
