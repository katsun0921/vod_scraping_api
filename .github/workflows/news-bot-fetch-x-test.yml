name: X News Bot - fetch_x.py 試作検証

on:
  workflow_dispatch:
    inputs:
      handle:
        description: "テスト対象のXアカウント（@なし）"
        required: false
        default: "anime_jaadugar"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: news_bot/requirements.txt

      - name: Install dependencies
        run: pip install -r news_bot/requirements.txt

      - name: Fetch X account (test)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TEST_X_HANDLE: ${{ github.event.inputs.handle }}
        run: python -m news_bot.fetch_x
