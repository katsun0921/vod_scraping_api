name: X News Bot

on:
  # テスト段階のためcron自動実行は無効化し、手動実行のみとする。
  # 本番投入時は下記のcomment outを解除する（仕様書 3.: 1〜2時間おき推奨）。
  # schedule:
  #   - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: news_bot/requirements.txt

      - name: Install dependencies
        run: pip install -r news_bot/requirements.txt

      - name: Run news bot pipeline
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.NEWS_BOT_ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.NEWS_BOT_X_API_KEY }}
          X_API_SECRET: ${{ secrets.NEWS_BOT_X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.NEWS_BOT_X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.NEWS_BOT_X_ACCESS_TOKEN_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.NEWS_BOT_SLACK_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL_ID: ${{ secrets.NEWS_BOT_SLACK_APPROVAL_CHANNEL_ID }}
        run: python -m news_bot.main
